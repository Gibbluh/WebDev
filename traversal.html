  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="bootstrap.html">E-Shop</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">

      </ul>
    </div>
  </div>
</nav>
<div class="container py-5">

<h2>Traversal Demo</h2>
<ul id="traverse-list" class="list-group mb-3">
  <li class="list-group-item">Item A</li>
  <li class="list-group-item">Item B</li>
  <li class="list-group-item">Item C</li>
  <li class="list-group-item">Item D</li>
</ul>
<button id="parent-btn" class="btn btn-primary mb-2">Highlight Parent</button>
<button id="siblings-btn" class="btn btn-secondary mb-2">Highlight Siblings</button>
<button id="next-btn" class="btn btn-success mb-2">Highlight Next</button>
<button id="prev-btn" class="btn btn-danger mb-2">Highlight Previous</button>
<script>
$(function(){
  $("#parent-btn").click(function(){ $("#traverse-list li:first").parent().toggleClass("bg-light"); });
  $("#siblings-btn").click(function(){ $("#traverse-list li:first").siblings().toggleClass("bg-warning"); });
  $("#next-btn").click(function(){ $("#traverse-list li:first").next().toggleClass("bg-success text-white"); });
  $("#prev-btn").click(function(){ $("#traverse-list li:last").prev().toggleClass("bg-danger text-white"); });
});
</script>

</div>
<footer class="bg-dark text-white text-center py-3">
  <p class="mb-0">© 2025 E-Shop | jQuery Demo Project</p>
</footer>
</body>
