<div class="container py-5">

<h2>Show/Hide Toggle Demo</h2>
<p>Click buttons to show, hide, or toggle the product card.</p>
<div class="card mb-3" id="product">
  <div class="card-body">
    <h5 class="card-title">Sample Product</h5>
    <p class="card-text">This is a product description.</p>
  </div>
</div>
<button id="show" class="btn btn-success">Show</button>
<button id="hide" class="btn btn-danger">Hide</button>
<button id="toggle" class="btn btn-primary">Toggle</button>
<script>
$(function(){
  $("#show").click(function(){ $("#product").show(); });
  $("#hide").click(function(){ $("#product").hide(); });
  $("#toggle").click(function(){ $("#product").toggle(); });
});
</script>
