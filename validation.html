<div class="container py-5">

<h2>Validation Demo</h2>
<form id="validate-form">
  <div class="mb-3">
    <label class="form-label">Username</label>
    <input type="text" class="form-control" id="username">
  </div>
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" id="vpassword">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
<div id="validate-msg" class="mt-3 alert alert-danger d-none"></div>
<script>
$(function(){
  $("#validate-form").on("submit", function(e){
    e.preventDefault();
    if($("#username").val() === "" || $("#vpassword").val() === ""){
      $("#validate-msg").removeClass("d-none").text("All fields are required!");
    } else {
      $("#validate-msg").removeClass("alert-danger").addClass("alert-success").text("Form submitted successfully!");
    }
  });
});
</script>

</div>
