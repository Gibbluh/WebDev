<div class="container py-5">

<h2>Animations Demo</h2>
<div id="box" class="bg-primary text-white p-5 mb-3 text-center">Animate Me</div>
<button id="animate" class="btn btn-warning">Animate</button>
<script>
$(function(){
  $("#animate").click(function(){
    $("#box").animate({ width: "toggle", height: "toggle", opacity: 0.5 }, 1000)
             .animate({ opacity: 1, fontSize: "2em" }, 1000);
  });
});
</script>
