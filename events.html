<div class="container py-5">

<h2>Events Demo</h2>
<p>Interact with the form elements below to see event handling.</p>
<input type="text" id="name" class="form-control mb-3" placeholder="Type your name">
<button id="btn" class="btn btn-primary">Click Me</button>
<div id="output" class="mt-3 alert alert-info d-none"></div>
<script>
$(function(){
  $("#btn").on("click", function(){
    $("#output").removeClass("d-none").text("Button clicked!");
  });
  $("#name").on("keyup", function(){
    $("#output").removeClass("d-none").text("You typed: " + $(this).val());
  });
  $("#name").on("focus", function(){ $(this).addClass("border-success"); })
           .on("blur", function(){ $(this).removeClass("border-success"); });
});
</script>
